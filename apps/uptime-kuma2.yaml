apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma2
  namespace: argocd
  # ---- CI build metadata (read by .github/workflows/build-and-deploy.yml) ----
  # Same SOURCE as app #1 but a DIFFERENT image name. CI builds this folder and
  # pushes it under the uptime-kuma2 name, then bumps this file's pod.tag.
  annotations:
    build/context: "uptime-kuma"
    build/dockerfile: "uptime-kuma/docker/dockerfile"
    build/target: "rootless"
    build/frontend: "true"
    build/image: "ghcr.io/noops-studio/uptime-kuma2"  # DIFFERENT image name from app #1
  # Keep the app from being pruned before its dependents finalize cleanly.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: "https://github.com/noops-studio/jb-final-project.git"
    targetRevision: "dev"
    path: "my-monitor"
    helm:
      # ALL values for this app live HERE. A genuinely DIFFERENT instance:
      # an OLDER pinned image tag and its own NodePort. CI bumps app #1 only,
      # so this one stays pinned to the version below.
      values: |
        service_type: NodePort
        replicas: 1
        ingress:
          enabled: false
          className: nginx
        pod:
          # DIFFERENT image NAME from app #1 (uptime-kuma2, not uptime-kuma).
          # CI must build+push this name before it exists in GHCR — see TODO below.
          image: "ghcr.io/noops-studio/uptime-kuma2"
          tag: "sha-d1862c0"   # pinned; CI will bump this once the uptime-kuma2 build is wired
          target_port: 3001
          port: 80
          node_port: 30081     # reach at http://<vm-ip>:30081 (app #1 keeps port 80)
        imagePullSecrets: []
  destination:
    server: https://kubernetes.default.svc
    # Separate namespace so the two apps don't collide.
    namespace: "apps2"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
