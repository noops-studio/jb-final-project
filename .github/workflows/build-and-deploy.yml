name: build-and-deploy

# Prod deploy: runs when app code lands on main (e.g. a PR merge), or manually.
on:
  push:
    branches: [main]
    paths:
      - 'uptime-kuma/**'
  workflow_dispatch: {}

# Never run two builds of the same ref at once (avoids racing commit-backs).
concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: false

# Least privilege: write packages (GHCR) and contents (commit the tag bump).
permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/noops-studio/uptime-kuma

jobs:
  build-push-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute immutable image tag
        id: vars
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The Dockerfile build stage does NOT run vite, and dist/ is gitignored.
      # We MUST build the frontend here or the image serves a broken UI.
      - name: Build frontend (vite dist/)
        working-directory: uptime-kuma
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: uptime-kuma
          file: uptime-kuma/docker/dockerfile
          target: rootless
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Update the Helm chart so ArgoCD redeploys the new immutable tag.
      - name: Bump image tag in Helm values
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          IMAGE_REPO: ${{ env.IMAGE }}
        run: |
          yq -i '.pod.image = strenv(IMAGE_REPO) | .pod.tag = strenv(TAG)' my-monitor/values.yaml
          echo "values.yaml now:"; grep -E "image:|tag:" my-monitor/values.yaml

      # Commit the bump back to dev. GITHUB_TOKEN pushes do NOT re-trigger CI,
      # and this file is outside the uptime-kuma/** path filter, so there is no loop.
      - name: Commit tag bump back to main
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if git diff --quiet -- my-monitor/values.yaml; then
            echo "No change to values.yaml, nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add my-monitor/values.yaml
          git commit -m "ci: deploy uptime-kuma ${TAG} [skip ci]"
          git pull --rebase origin main
          # Fail loudly if the push is rejected. main must allow the github-actions
          # bot to push directly (the values bump), e.g. exempt it from required PRs.
          git push origin HEAD:main || { echo "::error::push to main rejected — allow github-actions to push to main"; exit 1; }
