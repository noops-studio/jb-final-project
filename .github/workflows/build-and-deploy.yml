name: build-and-deploy

# Runs when app code lands on dev, or manually.
on:
  push:
    branches: [dev]
    paths:
      - 'uptime-kuma/**'
  workflow_dispatch: {}

# Never run two builds of the same ref at once (avoids racing commit-backs).
concurrency:
  group: build-and-deploy-${{ github.ref }}
  cancel-in-progress: false

# Least privilege: write packages (GHCR) and contents (commit the kustomize bump).
permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/noops-studio/uptime-kuma

jobs:
  build-push-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Compute immutable image tag
        id: vars
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # The Dockerfile build stage does NOT run vite, and dist/ is gitignored.
      # We MUST build the frontend here or the image serves a broken UI.
      - name: Build frontend (vite dist/)
        working-directory: uptime-kuma
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: uptime-kuma
          file: uptime-kuma/docker/dockerfile
          target: rootless
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ensure the kustomize CLI is available (needed for `kustomize edit set image`).
      - name: Set up kustomize
        run: |
          if ! command -v kustomize >/dev/null 2>&1; then
            curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
            sudo mv kustomize /usr/local/bin/
          fi
          kustomize version

      # Update the image in git via kustomize. ArgoCD watches k8s/ and PULLS this change.
      - name: Set image tag (kustomize)
        env:
          TAG: ${{ steps.vars.outputs.tag }}
          IMAGE_REPO: ${{ env.IMAGE }}
        run: |
          cd k8s
          kustomize edit set image "uptime-kuma=${IMAGE_REPO}:${TAG}"
          echo "kustomization.yaml images now:"; kustomize cfg cat kustomization.yaml 2>/dev/null || cat kustomization.yaml

      # Commit the bump back to dev. GITHUB_TOKEN pushes do NOT re-trigger CI,
      # and this file is outside the uptime-kuma/** path filter, so there is no loop.
      - name: Commit image bump back to dev
        env:
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if git diff --quiet -- k8s/kustomization.yaml; then
            echo "No change to kustomization.yaml, nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "ci: deploy uptime-kuma ${TAG} [skip ci]"
          git pull --rebase origin dev
          # Fail loudly if the push is rejected (e.g. dev is branch-protected).
          git push origin HEAD:dev || { echo "::error::push to dev rejected — allow github-actions to push to dev"; exit 1; }
