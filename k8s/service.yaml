apiVersion: v1
kind: Service
metadata:
  name: uptime-kuma
spec:
  # k3s servicelb (klipper) binds this to host port 80 on the VM,
  # which Azure maps to the public IP. Only ONE LoadBalancer Service may exist.
  type: LoadBalancer
  selector:
    app: uptime-kuma
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3001
