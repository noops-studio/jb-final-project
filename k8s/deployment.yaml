apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-kuma
spec:
  # Keep a few old ReplicaSets for quick rollback.
  revisionHistoryLimit: 3
  # SQLite is single-writer — keep exactly one replica.
  replicas: 1
  selector:
    matchLabels:
      app: uptime-kuma
  template:
    metadata:
      labels:
        app: uptime-kuma
    spec:
      containers:
        - name: uptime-kuma
          # "uptime-kuma" is a placeholder name; the real image+tag is injected
          # by the kustomize `images:` transformer (CI runs `kustomize edit set image`).
          image: uptime-kuma
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
